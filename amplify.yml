version: 1

# Backend (Serverless Framework)
# stage is derived from the branch name:main → dev and prod → prod
backend:
  phases:
    preBuild:
      commands:
        - cd backend
        - npm ci
    build:
      commands:
        - |
          if [ "$AWS_BRANCH" = "prod" ]; then
            STAGE=prod
          else
            STAGE=dev
          fi
        - |
          if [ -z "$SERVERLESS_ACCESS_KEY" ] && [ -z "$SERVERLESS_LICENSE_KEY" ]; then
            echo "Missing Serverless auth env var. Set SERVERLESS_ACCESS_KEY (recommended) or SERVERLESS_LICENSE_KEY in Amplify env vars."
            exit 1
          fi
        - npx serverless deploy --stage $STAGE --region ap-southeast-1

frontend:
  phases:
    preBuild:
      commands:
        - cd $CODEBUILD_SRC_DIR/frontend
        - npm ci
    build:
      commands:
        - cd $CODEBUILD_SRC_DIR/frontend
        - npm run build

  artifacts:
    # Vite outputs to frontend/dist
    baseDirectory: frontend/dist
    files:
      - '**/*'

  cache:
    paths:
      - frontend/node_modules/**/*
      - backend/node_modules/**/*

  # Cache-Control headers for all files.
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: Cache-Control
          value: 'no-store'
