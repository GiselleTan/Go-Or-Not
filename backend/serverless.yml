service: go-or-not-backend

frameworkVersion: '4'

build:
  esbuild: false

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, 'ap-southeast-1'}
  stage: ${opt:stage, 'dev'}
  memorySize: 512
  timeout: 30
  environment:
    NODE_ENV: ${self:provider.stage}
    WEATHER_METADATA_CACHE_TABLE: ${self:custom.weatherMetadataTableName}
    WEATHER_CACHE_TABLE: ${self:custom.weather2hrTableName}
    CARPARK_METADATA_TABLE: ${self:custom.carparkMetadataTableName}
    CARPARK_CACHE_TABLE: ${self:custom.carparkCacheTableName}
    IS_OFFLINE: ${env:IS_OFFLINE, 'true'}
    AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource: 'arn:aws:dynamodb:${self:provider.region}:*:table/*'

functions:
  health:
    handler: src/handlers/health/index.handler
    events:
      - http:
          path: /health
          method: GET
          cors: true

  getWeatherMetadata:
    handler: src/handlers/getWeatherMetadata/index.handler
    events:
      - http:
          path: /weather-metadata
          method: GET
          cors: true
          request:
            parameters:
              querystrings:
                latitude: true
                longitude: true
                region: false
            schemas:
              application/json: ${file(src/handlers/getWeatherMetadata/schema.json)}

  get2hrWeather:
    handler: src/handlers/get2hrWeather/index.handler
    events:
      - http:
          path: /weather
          method: GET
          cors: true
          request:
            parameters:
              querystrings:
                latitude: true
                longitude: true
            schemas:
              application/json: ${file(src/handlers/get2hrWeather/schema.json)}

  getParking:
    handler: src/handlers/getParking/index.handler
    events:
      - http:
          path: /parking
          method: GET
          cors: true
          request:
            parameters:
              querystrings:
                latitude: true
                longitude: true
            schemas:
              application/json: ${file(src/handlers/getParking/schema.json)}

plugins:
  - serverless-esbuild
  - serverless-offline

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    exclude:
      - '@aws-sdk/*'
    target: node20
    platform: node
    format: esm
    outputFileExtension: .mjs
    watch:
      pattern: ['src/**/*.ts']
      ignore: ['dist/**/*', 'node_modules/**/*']
  serverless-offline:
    httpPort: 3001
    websocketPort: 3002
    lambdaPort: 3003
    reloadHandler: true
    noPrependStageInUrl: true
  weatherMetadataTableName: weather-metadata-cache-${self:provider.stage}
  weather2hrTableName: weather-2hr-cache-${self:provider.stage}
  carparkMetadataTableName: carpark-metadata-${self:provider.stage}
  carparkCacheTableName: carpark-availability-cache-${self:provider.stage}

resources:
  Resources:
    WeatherMetadataCacheTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.weatherMetadataTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: pk
            AttributeType: S
          - AttributeName: sk
            AttributeType: S
        KeySchema:
          - AttributeName: pk
            KeyType: HASH
          - AttributeName: sk
            KeyType: RANGE
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

    Weather2hrCacheTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.weather2hrTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: pk
            AttributeType: S
          - AttributeName: sk
            AttributeType: S
        KeySchema:
          - AttributeName: pk
            KeyType: HASH
          - AttributeName: sk
            KeyType: RANGE
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

    CarparkMetadataTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.carparkMetadataTableName}
        AttributeDefinitions:
          - AttributeName: carpark_number
            AttributeType: S
        KeySchema:
          - AttributeName: carpark_number
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST

    CarparkCacheTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.carparkCacheTableName}
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true
        BillingMode: PAY_PER_REQUEST

package:
  individually: true
  patterns:
    - '!node_modules/**'
    - '!src/**'
    - '!.git/**'
