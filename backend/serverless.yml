service: go-or-not-backend

frameworkVersion: '4'

build:
  esbuild: false

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, 'ap-southeast-1'}
  stage: ${opt:stage, 'dev'}
  memorySize: 512
  timeout: 30
  environment:
    NODE_ENV: ${self:provider.stage}
    CACHE_TABLE: ${self:custom.cacheTableName}
    WEATHER_CACHE_TABLE: ${self:custom.weather2hrTableName}
    CARPARK_METADATA_TABLE: ${self:custom.carparkMetadataTableName}
    CARPARK_CACHE_TABLE: ${self:custom.carparkCacheTableName}
    NOTIFICATIONS_TABLE: ${self:custom.notificationsTableName}
    TRAFFIC_IMAGES_API_URL: ${self:custom.trafficImagesApiUrl}
    GOOGLE_MAPS_API_KEY: ${env:GOOGLE_MAPS_API_KEY, ''}
    SENDER_EMAIL: ${env:SENDER_EMAIL, ''}
    APP_BASE_URL: ${env:APP_BASE_URL, ''}
    TEMPERATURE_FUNCTION_NAME: ${self:service}-${self:provider.stage}-getTemperature
    WEATHER_METADATA_FUNCTION_NAME: ${self:service}-${self:provider.stage}-getWeatherMetadata
    WEATHER_2HR_FUNCTION_NAME: ${self:service}-${self:provider.stage}-get2hrWeather
    # TRAFFIC_IMAGES_FUNCTION_NAME: ${self:service}-${self:provider.stage}-getTrafficImages
    CARPARK_FUNCTION_NAME: ${self:service}-${self:provider.stage}-getParking
    ORCHESTRATOR_FUNCTION_NAME: ${self:service}-${self:provider.stage}-getRecommendation
    IS_OFFLINE: ${env:IS_OFFLINE, 'false'}
    AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource:
            - Fn::GetAtt: [CacheTable, Arn]
            - Fn::GetAtt: [Weather2hrCacheTable, Arn]
            - Fn::GetAtt: [CarparkMetadataTable, Arn]
            - Fn::GetAtt: [CarparkCacheTable, Arn]
            - Fn::GetAtt: [NotificationsTable, Arn]
            - Fn::Sub: '${NotificationsTable.Arn}/index/*'
        - Effect: Allow
          Action:
            - lambda:InvokeFunction
          Resource:
            - Fn::Sub: 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:go-or-not-backend-${self:provider.stage}-getTemperature'
            - Fn::Sub: 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:go-or-not-backend-${self:provider.stage}-getWeatherMetadata'
            - Fn::Sub: 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:go-or-not-backend-${self:provider.stage}-get2hrWeather'
            - Fn::Sub: 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:go-or-not-backend-${self:provider.stage}-getParking'
            - Fn::Sub: 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:go-or-not-backend-${self:provider.stage}-getRecommendation'
        - Effect: Allow
          Action:
            - ses:SendEmail
            - ses:SendRawEmail
          Resource: '*'

functions:
  health:
    handler: src/handlers/health/index.handler
    events:
      - http:
          path: /health
          method: GET
          cors: true

  getWeatherMetadata:
    handler: src/handlers/getWeatherMetadata/index.handler
    events:
      - http:
          path: /weather-metadata
          method: GET
          cors: true
          request:
            parameters:
              querystrings:
                latitude: true
                longitude: true
                region: false
            schemas:
              application/json: ${file(src/handlers/getWeatherMetadata/schema.json)}

  getTemperature:
    handler: src/handlers/getTemperature/index.handler
    events:
      - http:
          path: /temperature
          method: GET
          cors: true
          request:
            parameters:
              querystrings:
                latitude: true
                longitude: true

  get2hrWeather:
    handler: src/handlers/get2hrWeather/index.handler
    events:
      - http:
          path: /weather
          method: GET
          cors: true
          request:
            parameters:
              querystrings:
                latitude: true
                longitude: true
            schemas:
              application/json: ${file(src/handlers/get2hrWeather/schema.json)}

  getParking:
    handler: src/handlers/getParking/index.handler
    events:
      - http:
          path: /parking
          method: GET
          cors: true
          request:
            parameters:
              querystrings:
                latitude: true
                longitude: true
            schemas:
              application/json: ${file(src/handlers/getParking/schema.json)}

  getTrafficImages:
    handler: src/handlers/getTrafficImages/index.handler
    events:
      - http:
          path: /traffic-images
          method: GET
          cors: true
          request:
            parameters:
              querystrings:
                highway: true
            schemas:
              application/json: ${file(src/handlers/getTrafficImages/schema.json)}

  getRecommendation:
    handler: src/handlers/getRecommendation/index.handler
    events:
      - http:
          path: /recommendation
          method: POST
          cors: true

  subscribeNotification:
    handler: src/handlers/subscribeNotification/index.handler
    events:
      - http:
          path: /notifications/subscribe
          method: POST
          cors: true

  verifyNotification:
    handler: src/handlers/verifyNotification/index.handler
    events:
      - http:
          path: /notifications/verify
          method: GET
          cors: true
          request:
            parameters:
              querystrings:
                subscriptionKey: true
                token: true

  checker:
    handler: src/handlers/checker/index.handler

plugins:
  - serverless-esbuild
  - serverless-offline

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    exclude:
      - '@aws-sdk/*'
    target: node20
    platform: node
    format: esm
    outputFileExtension: .mjs
    watch:
      pattern: ['src/**/*.ts']
      ignore: ['dist/**/*', 'node_modules/**/*']
  serverless-offline:
    httpPort: 3001
    websocketPort: 3002
    lambdaPort: 3003
    reloadHandler: true
    noPrependStageInUrl: true
  cacheTableName: cache-${self:provider.stage}
  weather2hrTableName: weather-2hr-cache-${self:provider.stage}
  carparkMetadataTableName: carpark-metadata-${self:provider.stage}
  carparkCacheTableName: carpark-availability-cache-${self:provider.stage}
  notificationsTableName: notifications-${self:provider.stage}
  trafficImagesApiUrl: https://api.data.gov.sg/v1/transport/traffic-images

resources:
  Resources:
    CacheTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.cacheTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: pk
            AttributeType: S
          - AttributeName: sk
            AttributeType: S
        KeySchema:
          - AttributeName: pk
            KeyType: HASH
          - AttributeName: sk
            KeyType: RANGE
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

    Weather2hrCacheTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.weather2hrTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: pk
            AttributeType: S
          - AttributeName: sk
            AttributeType: S
        KeySchema:
          - AttributeName: pk
            KeyType: HASH
          - AttributeName: sk
            KeyType: RANGE
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

    CarparkMetadataTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.carparkMetadataTableName}
        AttributeDefinitions:
          - AttributeName: carpark_number
            AttributeType: S
        KeySchema:
          - AttributeName: carpark_number
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST

    CarparkCacheTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.carparkCacheTableName}
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true
        BillingMode: PAY_PER_REQUEST

    NotificationsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.notificationsTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: subscriptionKey
            AttributeType: S
          - AttributeName: status
            AttributeType: S
          - AttributeName: nextCheckAt
            AttributeType: N
        KeySchema:
          - AttributeName: subscriptionKey
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: status-nextCheckAt-index
            KeySchema:
              - AttributeName: status
                KeyType: HASH
              - AttributeName: nextCheckAt
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

    CheckerScheduleInvokeRole:
      Type: AWS::IAM::Role
      Properties:
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: scheduler.amazonaws.com
              Action: sts:AssumeRole
        Policies:
          - PolicyName: checker-schedule-invoke
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action: lambda:InvokeFunction
                  Resource:
                    Fn::GetAtt: [CheckerLambdaFunction, Arn]

    CheckerSchedule:
      Type: AWS::Scheduler::Schedule
      Properties:
        Name: ${self:service}-${self:provider.stage}-checker-schedule
        FlexibleTimeWindow:
          Mode: 'OFF'
        ScheduleExpression: rate(15 minutes)
        ScheduleExpressionTimezone: Asia/Singapore
        State: ENABLED
        Target:
          Arn:
            Fn::GetAtt: [CheckerLambdaFunction, Arn]
          RoleArn:
            Fn::GetAtt: [CheckerScheduleInvokeRole, Arn]
          Input: '{"source":"eventbridge-scheduler"}'

    CheckerScheduleLambdaPermission:
      Type: AWS::Lambda::Permission
      Properties:
        FunctionName:
          Ref: CheckerLambdaFunction
        Action: lambda:InvokeFunction
        Principal: scheduler.amazonaws.com
        SourceArn:
          Fn::GetAtt: [CheckerSchedule, Arn]
